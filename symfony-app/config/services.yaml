parameters:
    phoenix_base_url: '%env(PHOENIX_BASE_URL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\Repository\LikeRepositoryInterface: '@App\Repository\LikeRepository'

    App\Service\PhoenixClientInterface: '@App\Service\PhoenixClient'

    App\Service\PhoenixClient:
        arguments:
            $baseUrl: '%phoenix_base_url%'
